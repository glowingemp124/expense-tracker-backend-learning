name: CI/CD for Main Environment

on:
  push:
    branches:
      - main  # Run the workflow on every commit to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Ensures we can compare changes properly

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "18"

      - name: Create PEM file from Secret
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Ensure the target directory exists on EC2
        run: |
            ssh -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "mkdir -p ~/backend && sudo chmod -R 777 ~/backend"

      - name: Copy files to EC2
        run: |
          # Copy all files to the remote EC2 directory
          scp -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no -r * ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/backend/

      - name: Install dependencies
        run: |
          # Install dependencies if package.json was changed
          ssh -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cd ~/backend && npm install --force"

      - name: Restart server service on EC2
        run: |
          # Restart PM2 to apply changes
          ssh -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'pm2 restart all'
